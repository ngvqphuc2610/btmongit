<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huy-Tech | Đăng Nhập</title>
    <meta name="description" content="Giao diện đăng nhập hiện đại và chuyên nghiệp từ Huy-Tech.">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Background effects -->
    <div class="bg-circle circle-1"></div>
    <div class="bg-circle circle-2"></div>

    <main class="login-container">
        <header class="login-header">

        </header>

        <form id="loginForm" onsubmit="return false;">
            <div class="form-group">
                <label for="username">username</label>
                <div class="input-wrapper">
                    <input type="text" id="username" name="username" placeholder="Nhập username của bạn" required
                        autocomplete="username">
                </div>
            </div>


        </form>


    </main>


</body>
